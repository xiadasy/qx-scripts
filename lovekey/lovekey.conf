#!name=Lovekey键盘 1.8.5 修复版
#!desc=QX专用；适配Lovekey iOS 1.8.5，修复账号会员字段和聊天鉴权。更新2026-07-23
#!homepage=https://github.com/xiadasy/qx-scripts/tree/main/lovekey
#!author=xiadasy

# 聊天 / 开场白 / 超级对话：请求头替换为可用访客鉴权
^https:\/\/sea\.api\.lovekeyboard\.com\/v1\/chat\/(?:keyboard-(?:stream|ow)-msg|stream_super_msg) url script-request-header https://raw.githubusercontent.com/xiadasy/qx-scripts/main/lovekey/lovekey.js?v=1

# 账号信息：解密并修复会员字段后重新加密
^https:\/\/sea\.api\.lovekeyboard\.com\/v2\/account(?:\?.*)?$ url script-response-body https://raw.githubusercontent.com/xiadasy/qx-scripts/main/lovekey/lovekey.js?v=1

hostname = sea.api.lovekeyboard.com
